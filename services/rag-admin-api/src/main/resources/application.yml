server:
  port: 8091

spring:
  application:
    name: rag-admin-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5431}/${POSTGRES_DATABASE:rag}?currentSchema=rag_admin
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: rag_admin
  flyway:
    enabled: true
    schemas: rag_admin
    default-schema: rag_admin
    create-schemas: true

rag-admin:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - http://localhost:5175
      - http://localhost:5176
  security:
    jwt-secret: ${RAG_ADMIN_JWT_SECRET:openlinkhub-rag-admin-change-me-in-production}
    jwt-expiration-ms: ${RAG_ADMIN_JWT_EXPIRATION_MS:86400000}
